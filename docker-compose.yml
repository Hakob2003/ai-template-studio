version: '3.8'

services:
  # База данных
  postgres:
    image: postgres:15-alpine
    container_name: ai-studio-postgres
    environment:
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: studio
      POSTGRES_DB: aistudio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio -d aistudio"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-studio-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ai-studio-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-studio-network

  # MinIO (объектное хранилище)
  minio:
    image: minio/minio:latest
    container_name: ai-studio-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-studio-network

  # Инициализация MinIO бакета
  minio-init:
    image: minio/mc:latest
    container_name: ai-studio-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb local/ai-studio --ignore-existing;
      /usr/bin/mc anonymous set download local/ai-studio;
      echo 'MinIO bucket initialized';
      exit 0;
      "
    networks:
      - ai-studio-network

  # Бэкенд
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-studio-backend
    environment:
      - DATABASE_URL=postgresql://studio:studio@postgres:5432/aistudio
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_ACCESS_KEY=minioadmin
      - STORAGE_SECRET_KEY=minioadmin
      - STORAGE_BUCKET=ai-studio
      - STORAGE_PUBLIC_URL=http://localhost:9000/ai-studio
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "4000:4000"
    command: sh -c "node dist/server.js"
    networks:
      - ai-studio-network

  # Фронтенд
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-studio-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000/api
      - NEXT_PUBLIC_WS_URL=http://backend:4000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - ai-studio-network

  # Опционально: локальный Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: ai-studio-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ai-models
    networks:
      - ai-studio-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_uploads:
  ollama_data:

networks:
  ai-studio-network:
    driver: bridge
