databases:
  - name: ai-studio-db
    plan: free
    databaseName: aistudio
    user: studio

services:
  # Backend API
  - type: web
    name: ai-studio-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run seed:prod && node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: ai-studio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ai-studio-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: STORAGE_MODE
        value: local
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false

  # Redis
  - type: redis
    name: ai-studio-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # Frontend
  - type: web
    name: ai-studio-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false
